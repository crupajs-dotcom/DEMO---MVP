<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Valuneto — náhled pro investory</title>
<style>
  :root{ --ink:#0C140F; --paper:#F6F8F4; --net:#00C46A; --deep:#0A7F52; --slate:#6B756E; --slate-2:#9AA39C; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1100px 700px at 50% -10%, #14211a 0%, var(--ink) 60%), var(--ink);
    color:var(--paper); min-height:100%; overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }
  .bg-net{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none}
  .logo{font-weight:800;letter-spacing:-.5px;display:inline-flex;align-items:center;gap:.34em}
  .logo .n{color:var(--net);font-weight:500}
  .vmark{height:1.18em;width:1.18em;display:block;flex:none}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-size:17px;font-weight:700;
    padding:15px 20px;border-radius:14px;color:#05140C;width:100%;
    background:linear-gradient(180deg,#23E18D 0%,#00C46A 52%,#00AF5D 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 9px 20px -7px rgba(0,196,106,.55);transition:filter .15s,transform .12s}
  .btn:hover{filter:brightness(1.03)} .btn:active{transform:translateY(1px)}

  /* ===== GATE ===== */
  .gate{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:26px;
    background:radial-gradient(1100px 700px at 50% -10%, #14211a 0%, var(--ink) 60%), var(--ink);
    transition:opacity .45s ease, visibility .45s ease}
  .gate.hide{opacity:0;visibility:hidden;pointer-events:none}
  .gate-card{position:relative;z-index:2;width:100%;max-width:382px;text-align:center}
  .gate-card .logo{justify-content:center;margin-bottom:26px;font-size:23px}
  .gate-eyebrow{font-size:12px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--net)}
  .gate-h1{font-size:30px;font-weight:800;letter-spacing:-.6px;line-height:1.12;margin:10px 0 12px}
  .gate-sub{font-size:14.5px;line-height:1.5;color:var(--slate-2);margin-bottom:24px}
  .gate-input{width:100%;font-family:inherit;font-size:18px;font-weight:700;text-align:center;letter-spacing:3px;
    padding:16px;border-radius:14px;border:1.5px solid #25342c;background:#0f1a14;color:var(--paper);
    outline:none;transition:border-color .15s;margin-bottom:14px;text-transform:uppercase}
  .gate-input:focus{border-color:var(--net)}
  .gate-input::placeholder{color:#56635b;letter-spacing:.5px;font-weight:500;text-transform:none}
  .gate-err{display:none;color:#FF6B57;font-size:13px;font-weight:700;margin:-4px 0 12px}
  .gate-err.show{display:block}
  .gate-foot{font-size:11.5px;color:var(--slate);margin-top:20px;line-height:1.5}

  /* ===== VIEWER ===== */
  .viewer{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:20px 16px}
  .topbar{position:fixed;top:16px;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;font-size:13px}
  .topbar .logo{font-size:17px}
  .topbar .wm{color:var(--slate-2);font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace}
  .head{text-align:center;min-height:54px}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--net)}
  .minbadge{display:inline-block;margin-left:8px;font-size:11px;font-weight:800;color:#05140C;vertical-align:middle;
    background:linear-gradient(180deg,#23E18D,#00C46A);padding:3px 11px;border-radius:999px}
  .stage{position:relative;display:flex;align-items:center;justify-content:center}
  .frame{position:relative;border-radius:30px;padding:8px;background:#050907;
    box-shadow:0 0 0 2px #2b352e,0 40px 90px -20px rgba(0,0,0,.75);}
  .frame .slide{display:none}
  .frame .slide.active{display:block}
  .shot{display:block;border-radius:23px;height:min(74vh,760px);width:auto;pointer-events:none}
  .cap{text-align:center;max-width:420px;font-size:14px;line-height:1.5;color:var(--paper);font-weight:600}
  .ctrls{display:flex;align-items:center;gap:16px;margin-top:2px}
  .navbtn{font-family:inherit;background:#16211b;color:var(--paper);border:1px solid #25342c;border-radius:12px;
    padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
  .navbtn:hover{background:#1d2b24} .navbtn:disabled{opacity:.4;cursor:default}
  .dots{display:flex;gap:7px}
  .dots i{width:8px;height:8px;border-radius:50%;background:#2c3a32;transition:background .2s,width .2s}
  .dots i.on{background:var(--net);width:20px;border-radius:4px}
  .hint{color:#56635b;font-size:12px}
</style>
</head>

    <p class="gate-sub">Zadej přístupový kód od týmu Valuneto a projdi si klíčové obrazovky.</p>
    <input id="gateCode" class="gate-input" type="text" autocomplete="off" spellcheck="false" placeholder="Přístupový kód" onkeydown="if(event.key==='Enter'){unlock();}">
    <div id="gateErr" class="gate-err">Neplatný kód. Zkus to znovu.</div>
    <button class="btn" onclick="unlock()">Vstoupit →</button>
    <p class="gate-foot">Pouze náhled obrazovek. Neveřejné — nešiř dál.</p>
  </div>
</div>

<script>
  var META=[{eb:'Předplatné',mn:'2 min',cap:'Po propojení účtů appka sečte všechna předplatná a označí, co nevyužíváš.'},{eb:'Skip Pay · ČSOB',mn:'5 min',cap:'Skip Pay jako první rychlá akce s flexibilitou plateb.'},{eb:'Ušetřit',mn:'10 min',cap:'Životní pojištění rozkliknuté: kolik bys měl platit podle profilu.'},{eb:'Milník',mn:'15 min',cap:'Milník s úsporou a tři opakované páky: cashback, MGM, tiery.'}];
  var slides=document.querySelectorAll('.slide');
  var dots=document.querySelectorAll('#dots i');
  var i=0;
  function show(n){
    i=Math.max(0,Math.min(slides.length-1,n));
    slides.forEach(function(s,k){ s.classList.toggle('active',k===i); });
    dots.forEach(function(d,k){ d.classList.toggle('on',k===i); });
    document.getElementById('eb').textContent=META[i].eb;
    document.getElementById('mn').textContent=META[i].mn;
    document.getElementById('cap').textContent=META[i].cap;
    document.getElementById('prevBtn').disabled=(i===0);
    document.getElementById('nextBtn').disabled=(i===slides.length-1);
  }
  function go(d){ show(i+d); }
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight') go(1);
    if(e.key==='ArrowLeft') go(-1);
  });
  show(0);

  // ---- gate ----
  var ACCESS_CODE="VALUNETO26"; // zmen kod zde (nezalezi na velikosti pismen)
  function unlock(){
    var inp=document.getElementById('gateCode'), err=document.getElementById('gateErr');
    if((inp.value||'').trim().toUpperCase()===ACCESS_CODE){
      var g=document.getElementById('gate'); err.classList.remove('show'); g.classList.add('hide');
      setTimeout(function(){ g.style.display='none'; },460);
    } else { err.classList.add('show'); inp.value=''; inp.focus(); }
  }
  window.addEventListener('load',function(){ var c=document.getElementById('gateCode'); if(c) c.focus(); });
</script>
